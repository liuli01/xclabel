name: Docker Publish - All Images

# 手动触发：一次性构建所有镜像
on:
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag or commit
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version from tag: $VERSION"
          else
            VERSION=$(git log -1 --pretty=%B | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -n "$VERSION" ]; then
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "Version from commit: $VERSION"
            else
              echo "version=" >> $GITHUB_OUTPUT
              echo "No version found, will push latest only"
            fi
          fi

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server-cpu
            image: liuli01/xclabel-server
            dockerfile: Dockerfile.server.cpu
            context: .
            suffix: cpu
          - name: server-gpu
            image: liuli01/xclabel-server
            dockerfile: Dockerfile.server.gpu
            context: .
            suffix: gpu
          - name: nndeploy
            image: liuli01/xclabel-nndeploy
            dockerfile: nndeploy-app/Dockerfile
            context: .
            suffix: ""
          - name: deploy-cpu
            image: liuli01/xclabel-deploy
            dockerfile: Dockerfile.deploy.cpu
            context: .
            suffix: cpu
          - name: deploy-gpu
            image: liuli01/xclabel-deploy
            dockerfile: Dockerfile.deploy.gpu
            context: .
            suffix: gpu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ matrix.suffix == '' }}
            type=raw,value=${{ matrix.suffix }}-latest,enable=${{ matrix.suffix != '' }}
            type=raw,value=${{ needs.version.outputs.version }},enable=${{ needs.version.outputs.version != '' && matrix.suffix == '' }}
            type=raw,value=${{ matrix.suffix }}-${{ needs.version.outputs.version }},enable=${{ needs.version.outputs.version != '' && matrix.suffix != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
