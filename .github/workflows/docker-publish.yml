name: Docker Publish - All Images

# 打 tag 或手动触发：构建并推送至 ghcr.io 及 Docker Hub
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:


jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag or commit
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version from tag: $VERSION"
          else
            VERSION=$(git log -1 --pretty=%B | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ -n "$VERSION" ]; then
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "Version from commit: $VERSION"
            else
              echo "version=" >> $GITHUB_OUTPUT
              echo "No version found, will push latest only"
            fi
          fi

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server-cpu
            image: xclabel-server-cpu
            dockerfile: Dockerfile.server.cpu
            context: .
          - name: server-gpu
            image: xclabel-server-gpu
            dockerfile: Dockerfile.server.gpu
            context: .
          - name: nndeploy
            image: xclabel-nndeploy
            dockerfile: nndeploy-app/Dockerfile
            context: .
          - name: deploy-cpu
            image: xclabel-deploy-cpu
            dockerfile: Dockerfile.deploy.cpu
            context: .
          - name: deploy-gpu
            image: xclabel-deploy-gpu
            dockerfile: Dockerfile.deploy.gpu
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Generate tags
        id: meta
        run: |
          VERSION="${{ needs.version.outputs.version }}"

          # ghcr.io 标签
          TAGS="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest"
          # Docker Hub 标签
          TAGS="$TAGS,liuli01/${{ matrix.image }}:latest"

          if [ -n "$VERSION" ]; then
            TAGS="$TAGS,ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:$VERSION"
            TAGS="$TAGS,liuli01/${{ matrix.image }}:$VERSION"
          fi

          # 始终附带 sha 标签
          TAGS="$TAGS,ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${{ github.sha }}"

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Generated tags:"
          echo "${TAGS}" | tr ',' '\n'

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
