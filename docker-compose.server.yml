services:
  xclabel-server:
    build: .
    container_name: xclabel-server
    ports:
      - "9924:5000"
    volumes:
      - ./projects:/app/projects
      - ./uploads:/app/uploads
      - ./static/annotations:/app/static/annotations
      - ./plugins:/app/plugins
      - nndeploy-resources:/app/resources
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
      - NNDEPLOY_APP_URL=http://nndeploy-app:8002
    restart: unless-stopped

  nndeploy-app:
    build:
      context: .
      dockerfile: nndeploy-app/Dockerfile
    container_name: nndeploy-app
    command: nndeploy-app --port 8002 --resources /app/resources
    ports:
      - "8002:8002"
    volumes:
      - nndeploy-resources:/app/resources
    environment:
      - NNDEPLOY_RESOURCES=/app/resources
    restart: unless-stopped

  xclabel-deploy-cpu:
    build:
      context: .
      dockerfile: Dockerfile.deploy.cpu
    container_name: xclabel-deploy-cpu
    ports:
      - "8000:8000"
    environment:
      - SERVER_URL=http://xclabel-server:5000
      - CACHE_DIR=/app/cache
      - MAX_ENGINES=10
    volumes:
      - deploy-cache-cpu:/app/cache
    depends_on:
      - xclabel-server
    restart: unless-stopped

  xclabel-deploy-gpu:
    build:
      context: .
      dockerfile: Dockerfile.deploy.gpu
    container_name: xclabel-deploy-gpu
    ports:
      - "8001:8000"
    environment:
      - SERVER_URL=http://xclabel-server:5000
      - CACHE_DIR=/app/cache
      - MAX_ENGINES=5
    volumes:
      - deploy-cache-gpu:/app/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - xclabel-server
    restart: unless-stopped

volumes:
  nndeploy-resources:
  deploy-cache-cpu:
  deploy-cache-gpu:
