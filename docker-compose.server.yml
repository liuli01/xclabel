services:
  xclabel-server:
    build:
      context: .
      dockerfile: Dockerfile.server.cpu
    container_name: xclabel-server
    ports:
      - "9924:5000"
    volumes:
      - ./projects:/app/projects
      - ./uploads:/app/uploads
      - ./static/annotations:/app/static/annotations
      - ./plugins:/app/plugins
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
      - DEPLOY_SERVER_URL=http://xclabel-deploy-cpu:8000
    restart: unless-stopped

  xclabel-deploy-cpu:
    build:
      context: .
      dockerfile: Dockerfile.deploy.cpu
    container_name: xclabel-deploy-cpu
    ports:
      - "8000:8000"
    environment:
      - SERVER_URL=http://xclabel-server:5000
      - CACHE_DIR=/app/cache
      - MAX_ENGINES=10
    volumes:
      - deploy-cache-cpu:/app/cache
    depends_on:
      - xclabel-server
    restart: unless-stopped

  xclabel-deploy-gpu:
    build:
      context: .
      dockerfile: Dockerfile.deploy.gpu
    container_name: xclabel-deploy-gpu
    ports:
      - "8001:8000"
    environment:
      - SERVER_URL=http://xclabel-server:5000
      - CACHE_DIR=/app/cache
      - MAX_ENGINES=5
    volumes:
      - deploy-cache-gpu:/app/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - xclabel-server
    restart: unless-stopped

volumes:
  deploy-cache-cpu:
  deploy-cache-gpu:
