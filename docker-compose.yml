version: "3.8"

services:
  xclabel:
    build: .
    container_name: xclabel
    ports:
      - "9924:5000"
    volumes:
      # 上传文件持久化
      - ./uploads:/app/uploads
      # 标注数据持久化
      - ./static/annotations:/app/static/annotations
      # YOLO11 插件目录
      - ./plugins:/app/plugins
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
    restart: unless-stopped
